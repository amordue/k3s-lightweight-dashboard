apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-dashboard
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k3s-dashboard
  template:
    metadata:
      labels:
        app: k3s-dashboard
    spec:
      serviceAccountName: k3s-dashboard
      containers:
        - name: app
          image: ghcr.io/alexmordue/k3s-dashboard:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: SCRAPE_INTERVAL
              value: "1m"
            - name: RETENTION_PERIOD
              value: "168h"
            - name: SQLITE_PATH
              value: "/data/state/metrics.db"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: k3s-dashboard-data
---
apiVersion: v1
kind: Service
metadata:
  name: k3s-dashboard
  namespace: monitoring
spec:
  selector:
    app: k3s-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http