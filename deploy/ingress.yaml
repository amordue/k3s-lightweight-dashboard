apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k3s-dashboard
  namespace: monitoring
spec:
  ingressClassName: traefik
  rules:
    - host: k3s-dashboard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k3s-dashboard
                port:
                  number: 80